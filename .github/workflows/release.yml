name: Release Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build linux-amd64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libssl-dev libjsoncpp-dev libyaml-cpp-dev \
            libpaho-mqtt-dev libpaho-mqttpp-dev \
            libcurl4-openssl-dev libdrogon-dev \
            libpqxx-dev libpq-dev \
            uuid-dev libhiredis-dev libbrotli-dev zlib1g-dev \
            libmariadb-dev libsqlite3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Angular frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npx ng build --configuration production

      - name: Build C++
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=OFF ..
          make -j$(nproc)
          strip hms_firetv

      - name: Package
        run: |
          mkdir -p dist/static
          cp build/hms_firetv dist/
          cp -r frontend/dist/frontend/browser/* dist/static/
          cp VERSION dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ] && cp LICENSE dist/ || true
          [ -f schema.sql ] && cp schema.sql dist/ || true
          [ -f hms-firetv.service ] && cp hms-firetv.service dist/ || true
          tar -czf hms_firetv-linux-amd64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hms_firetv-linux-amd64
          path: hms_firetv-linux-amd64.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          ls -lh release/

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          files: release/*
